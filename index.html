<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studygram</title>
    <!-- Google Fonts: Poppins, Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: radial-gradient(circle at 20% 30%, #1a1f3a, #030513);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            width: 360px;
            height: 740px;
            background: linear-gradient(145deg, #09123a 0%, #02062c 100%);
            color: #f0ecdd;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 20px 0;              /* no vertical padding at start */
            backdrop-filter: blur(2px);
            scrollbar-width: thin;
            scrollbar-color: #5e6f9f #1e264a;
        }

        .app::-webkit-scrollbar {
            width: 5px;
        }
        .app::-webkit-scrollbar-track {
            background: #1e264a;
        }
        .app::-webkit-scrollbar-thumb {
            background: #5e6f9f;
            border-radius: 20px;
        }

        /* --- CENTER LOADER ZONE (absolutely centered) --- */
        .loader-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            transition: opacity 0.8s ease;
            z-index: 20;
            pointer-events: none;  /* let clicks pass if needed, but we control fade */
        }

        .loader-container.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .image-container {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            transition: opacity 0.7s;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1e2b5a;
        }

        /* sleek loader bar */
        .loader {
            width: 200px;
            height: 6px;
            background: rgba(255,255,240,0.2);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b3ccff, #ffffff, #cadcff);
            border-radius: 12px;
            animation: load 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes load {
            0% { width: 0%; opacity: 0.7; }
            20% { width: 30%; opacity: 1; }
            50% { width: 65%; }
            80% { width: 90%; }
            100% { width: 100%; opacity: 0.95; }
        }

        /* --- main content (title + form) fades in after loader --- */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease, transform 1s ease;
            padding: 20px 0;
            z-index: 10;
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .studygram-title {
            font-size: 44px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(130deg, #ffe6b0, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .studygram-title i {
            background: #293669;
            padding: 10px;
            border-radius: 50%;
            color: #ffeaad;
            font-size: 28px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.5);
        }

        /* unified form card */
        .login-card {
            width: 85%;
            max-width: 300px;
            background: rgba(18, 25, 55, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 42px;
            padding: 28px 20px;
            border: 1px solid rgba(255, 245, 200, 0.2);
            box-shadow: 0 20px 40px -10px #03051a;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.4px;
            color: #c9d8f0;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
        }

        label:first-of-type {
            margin-top: 0;
        }

        label i {
            font-size: 14px;
            color: #ffe8b5;
            width: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 40px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,240,200,0.2);
            color: #f2f0e0;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 230, 160, 0.7);
        }

        input.error-border {
            border-color: #ff9f8f;
            background: rgba(255, 120, 100, 0.15);
        }

        .error-message {
            color: #ffb9a9;
            font-size: 11px;
            margin: 4px 0 4px 12px;
            min-height: 18px;
            font-weight: 400;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .error-message i {
            font-size: 12px;
            color: #ff9478;
        }

        button {
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 60px;
            background: white;
            color: #030957;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 24px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.18s ease;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button i {
            color: #13204e;
            font-size: 16px;
        }

        button:hover {
            background: #ffeac2;
            transform: scale(0.98);
        }

        .id-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .id-row input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .id-row button {
            width: auto;
            padding: 12px 16px;
            margin-top: 0;
            font-size: 13px;
            background: #e9e3d5;
            color: #04105c;
            font-weight: 600;
            gap: 5px;
        }

        .small-note {
            font-size: 10px;
            color: #acb9e3;
            margin-top: 16px;
            text-align: center;
            border-top: 1px dashed rgba(255,255,200,0.15);
            padding-top: 12px;
        }
.app.no-scroll {
    overflow: hidden;
    height: 740px;  /* Keep fixed height */
    position: relative;
}
.app.loading {
    pointer-events: none;  
}

.app.loading .loader-container {
    pointer-events: none; 
}

    </style>
</head>
<body>

<div class="app">
    <!-- LOADER SECTION – absolutely centered -->
    <div class="loader-container" id="loaderContainer">
        <div class="image-container">
            <img src="logo.jpg" alt="logo" onerror="this.src='https://via.placeholder.com/400x400/1e2b5a/ffffff?text=📘'">
        </div>
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- MAIN CONTENT (title + unified form) initially hidden -->
    <div class="content" id="mainContent">
        <div class="studygram-title">
            Login
        </div>

        <div class="login-card">
            <!-- Name -->
            <label><i class="fas fa-user"></i> Name</label>
            <input type="text" id="name" placeholder="e.g. Hoo Lee Sheet" value="">
            <div class="error-message" id="nameError"></div>

            <!-- Gmail -->
            <label><i class="fab fa-google"></i> Gmail</label>
            <input type="email" id="gmail" placeholder="iamnigga@gmail.com" value="">
            <div class="error-message" id="gmailError"></div>

            <!-- College -->
            <label><i class="fas fa-university"></i> College</label>
            <input type="text" id="college" placeholder="Nigga College" value="">
            <div class="error-message" id="collegeError"></div>

            <!-- Student ID (auto, with copy) -->
            <label><i class="fas fa-qrcode"></i> Student ID</label>
            <div class="id-row">
                <input type="text" id="studentId" readonly value="">
                <button onclick="copyID()"><i class="far fa-copy"></i> Copy</button>
            </div>
            <div class="error-message" id="studentIdError"></div>

            <!-- Access Code -->
            <label><i class="fas fa-lock"></i> Access Code</label>
            <input type="text" id="accessCode" placeholder="">
            <div class="error-message" id="accessError"></div>

            <!-- Proceed button (single step) -->
            <button onclick="handleProceed()"><i class="fas fa-sign-in-alt"></i> Proceed</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- REDIRECT if already logged in (before loader finishes) ----------
        if (localStorage.getItem("loggedIn") === "true") {
            // Still show loader briefly? requirement: show loader thing and send to home.html
            // We keep the loader for 5 seconds then redirect, but we can also redirect immediately after loader.
            // To be smooth: display loader full 5 sec then redirect. but "send him to home.html" likely immediate after loader.
            // We'll wait the 5s with loader visible, then redirect. That matches "show the loader thing and send him to home.html"
            // So we don't redirect instantly, we let loader run, then redirect.
            console.log("already logged in – will redirect after loader");
            setTimeout(() => {
                window.location.replace("home.html");
            }, 5000); // 5 seconds
        }

        // ---------- Elements ----------
        const loaderContainer = document.getElementById('loaderContainer');
        const mainContent = document.getElementById('mainContent');

        // Inputs
        const nameInput = document.getElementById('name');
        const gmailInput = document.getElementById('gmail');
        const collegeInput = document.getElementById('college');
        const studentIdField = document.getElementById('studentId');
        const accessCodeInput = document.getElementById('accessCode');

        // Error divs
        const nameErr = document.getElementById('nameError');
        const gmailErr = document.getElementById('gmailError');
        const collegeErr = document.getElementById('collegeError');
        const studentIdErr = document.getElementById('studentIdError');
        const accessErr = document.getElementById('accessError');

        // Add scroll-blocking class immediately when page loads
document.querySelector('.app').classList.add('loading', 'no-scroll');

// ---------- Loader fade + content fade + enable interactions ----------
setTimeout(() => {
    // Fade out loader container
    loaderContainer.classList.add('fade-out');
    
    // Enable scrolling AND clicks by removing BOTH classes
    document.querySelector('.app').classList.remove('loading', 'no-scroll');

    // After fade, hide loader container (so it doesn't block clicks) and show content
    setTimeout(() => {
        loaderContainer.style.display = 'none';   // remove from layout

        // Make content visible with fade
        mainContent.classList.add('visible');
    }, 800); // match fade-out duration
}, 5000); // 5 sec loading

        // ---------- Student ID generation / retrieval ----------
        function updateStudentID() {
            let stored = localStorage.getItem('studentId');
            if (!stored) {
                stored = generateStudentID();
                localStorage.setItem('studentId', stored);
            }
            studentIdField.value = stored;
            return stored;
        }

        // generate random 8-char alphanumeric
        window.generateStudentID = function() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let id = "";
            for (let i = 0; i < 8; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        };

        // initialise student ID on page load (even before form appears)
        updateStudentID();

        // ---------- helpers: clear errors ----------
        function clearAllErrors() {
            [nameErr, gmailErr, collegeErr, studentIdErr, accessErr].forEach(div => div.innerHTML = '');
            [nameInput, gmailInput, collegeInput, studentIdField, accessCodeInput].forEach(inp => inp.classList.remove('error-border'));
        }

        function setError(element, errorDiv, message) {
            element.classList.add('error-border');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
        }

        // ---------- Access code algorithm (same as before) ----------
        function generateAccessCode(studentId) {
            const secret = "COURSE2025";
            let hash = 0;
            const str = studentId + secret;
            for (let i = 0; i < str.length; i++) {
                hash += str.charCodeAt(i) * (i + 1);
            }
            return btoa(String(hash)).substring(0, 8);
        }

        // ---------- Copy ID with feedback ----------
        window.copyID = function() {
            if (navigator.clipboard && studentIdField.value) {
                navigator.clipboard.writeText(studentIdField.value);
                const copyBtn = document.querySelector('.id-row button');
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => { copyBtn.innerHTML = originalHTML; }, 1500);
            } else {
                alert("Manual copy: " + studentIdField.value);
            }
        };

        // ---------- MAIN PROCEED (unified validation) ----------
        window.handleProceed = function() {
            clearAllErrors();

            const nameVal = nameInput.value.trim();
            const gmailVal = gmailInput.value.trim();
            const collegeVal = collegeInput.value.trim();
            const studentId = studentIdField.value.trim();   // always present
            const accessCode = accessCodeInput.value.trim();

            let isValid = true;

            // Name
            if (!nameVal) {
                setError(nameInput, nameErr, 'Name is required');
                isValid = false;
            }

            // Gmail
            const gmailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!gmailVal) {
                setError(gmailInput, gmailErr, 'Gmail is required');
                isValid = false;
            } else if (!gmailRegex.test(gmailVal) || !gmailVal.toLowerCase().includes('@gmail.com')) {
                setError(gmailInput, gmailErr, 'Enter a valid Gmail address');
                isValid = false;
            }

            // College
            if (!collegeVal) {
                setError(collegeInput, collegeErr, 'College cannot be blank');
                isValid = false;
            }

            // Student ID should be present (it is auto)
            if (!studentId) {
                setError(studentIdField, studentIdErr, 'ID error – regenerate?');
                isValid = false;
            }

            // Access code
            const correctCode = generateAccessCode(studentId);
            if (!accessCode) {
                setError(accessCodeInput, accessErr, 'Access code is required');
                isValid = false;
            } else if (accessCode !== correctCode) {
                setError(accessCodeInput, accessErr, `Incorrect code. (hint: ${correctCode})`);
                isValid = false;
            }

            if (!isValid) return;

            // ---------- SUCCESS: store & redirect ----------
            // Save details to localStorage (optional)
            localStorage.setItem('studentName', nameVal);
            localStorage.setItem('studentGmail', gmailVal);
            localStorage.setItem('studentCollege', collegeVal);
            localStorage.setItem('loggedIn', 'true');
            // studentId already stored

            // Redirect to home.html
            window.location.href = 'home.html';
        };

    })();
</script>
</body>
</html>
