<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @font-face {
  font-family: 'Montserrat Bold';
  src: url('Montserrat-Bold.woff2') format('woff2'),
       url('Montserrat-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
}

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #030957;
    color: #F2EBCF;
    font-family: 'Helvetica LT Std Bold', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .image-container {
  width: 400px;
  height: 200px;
  margin-bottom: 40px;
  border-radius: 20px;
}

  .image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .loader {
    width: 80%;
    height: 4px; /* thin loader */
    background-color: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .loader-bar {
    width: 0%;
    height: 100%;
    background-color: #FFFFFF;
    animation: load 5s linear forwards;
  }

  @keyframes load {
    0% { width: 0%; }
    100% { width: 100%; }
  }

  .message {
    text-align: center;
    font-size: 20px;
    padding: 0 20px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .message.visible {
    opacity: 1;
  }
</style>
</head>
