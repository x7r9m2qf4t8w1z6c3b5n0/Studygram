<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studygram</title>
    <!-- Google Fonts: Montserrat + Crimson Text + Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Hind+Siliguri:wght@400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --bg-primary: #030513;
        --bg-secondary: #0a1235;
        --bg-card: #132049;
        --bg-hover: #1b275a;
        --text-primary: #f0ecdd;
        --text-secondary: #9aa9c9;
        --accent: #ffe2a4;
        --accent-light: #ffdd9e;
        --border-light: rgba(255,245,200,0.1);
        --border-accent: rgba(255,230,160,0.3);
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 30px;
        --border-radius-sm: 8px;
        --border-radius-md: 12px;
        --border-radius-lg: 24px;
        --border-radius-xl: 40px;
        --border-radius-full: 50px;
        --transition-speed: 0.2s;
        --header-height: 80px;
        --z-index-sticky: 10;
        --z-index-toast: 200;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    html, body {
        background: var(--bg-primary);
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }

    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    .app {
        margin: 0 auto;
        width: 100%;
        max-width: 480px;
        height: 100vh;
        position: relative;
        overflow: hidden;
    }

    @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    .skeleton {
        background: linear-gradient(90deg, #132049 25%, #1e2a55 50%, #132049 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: var(--border-radius-sm);
    }

    .view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: var(--bg-primary);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
        will-change: transform, opacity;
        pointer-events: auto;
    }

    .view.hidden {
        display: block !important;
        pointer-events: none;
        opacity: 0;
        transform: translateX(30px);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
    }

    #homeView {
        transform: translateX(0);
    }
    
    #homeView.hidden {
        transform: translateX(-30px);
    }
    
    #subjectDetailView {
        transform: translateX(0);
    }
    
    #subjectDetailView.hidden {
        transform: translateX(30px);
    }
    
    #playerView {
        transform: translateX(0);
    }
    
    #playerView.hidden {
        transform: translateX(30px);
    }

    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--spacing-xl) 21px;
        background: rgba(10, 18, 53, 0.98);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: var(--z-index-sticky);
        border-bottom: 1px solid var(--border-light);
    }

    .detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: var(--spacing-xl) 21px;
        background: rgba(10, 18, 53, 0.98);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: var(--z-index-sticky);
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .logo-text {
        font-size: 23px;
        font-weight: 700;
        background: linear-gradient(130deg, #ffe6b0, #ffffff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-family: 'Montserrat', sans-serif;
    }

    .search-container {
        flex: 1;
        max-width: 180px;
        margin: 0 12px;
    }

    .search-box {
        width: 100%;
        padding: 10px var(--spacing-md);
        border-radius: var(--border-radius-full);
        border: none;
        background: rgba(255,255,240,0.1);
        border: 1px solid var(--border-accent);
        color: var(--text-primary);
        font-size: 14px;
        font-family: 'Hind Siliguri', sans-serif;
        outline: none;
        transition: border-color var(--transition-speed), background 0.2s ease;
    }

    .search-box:focus {
        border-color: var(--accent);
        background: rgba(255,255,240,0.15);
    }

    .search-box::placeholder {
        color: var(--text-secondary);
    }

    .profile-icon {
        font-size: 24px;
        color: #ffe2a4;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10%;
        background: rgba(50,60,120,0.5);
        cursor: pointer;
        transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
        border: 1px solid rgba(255,240,170,0.3);
    }

    .profile-icon:active {
        background: #3f4c8a;
        transform: scale(0.94);
    }

    .back-btn {
        font-size: 26px;
        color: #ffeac2;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #1e2a55;
        cursor: pointer;
        transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
    }

    .back-btn:hover {
        background: #2a3a6e;
    }

    .back-btn:active {
        transform: scale(0.92);
    }

    .detail-search {
        flex: 1;
    }

    .section-title {
        font-size: 22px;
        font-weight: 600;
        padding: var(--spacing-md) var(--spacing-md) var(--spacing-md);
        color: #f2e5cc;
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        font-family: 'Montserrat', sans-serif;
    }

    .section-title i {
        color: #ffe8b5;
        font-size: 18px;
    }

    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
        font-family: 'Hind Siliguri', sans-serif;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .empty-state i {
        font-size: 48px;
        margin-bottom: var(--spacing-md);
        color: #3f4c8a;
    }

    .empty-state p {
        font-size: 16px;
    }

    .subject-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding: var(--spacing-sm) var(--spacing-md) 20px;
    }

    .subject-card {
        background: var(--bg-card);
        border-radius: var(--border-radius-lg);
        overflow: hidden;
        border: 1px solid rgba(255,225,150,0.2);
        box-shadow: 0 10px 15px -8px black;
        cursor: pointer;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s, box-shadow 0.2s;
        will-change: transform;
    }

    .subject-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 20px -10px black;
    }

    .subject-card:active {
        transform: scale(0.97);
        background: var(--bg-hover);
    }

    .subject-card.hidden {
        display: none;
    }

    .thumb-square {
        aspect-ratio: 1 / 1;
        width: 100%;
        background: #202d5a;
    }

    .thumb-square img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
    }

    .subject-card:hover .thumb-square img {
        transform: scale(1.05);
    }

    .card-info {
        padding: 10px 12px 12px;
    }

    .subject-name {
        font-weight: 600;
        font-size: 15px;
        color: #ffefcf;
        font-family: 'Montserrat', sans-serif;
    }

    .class-count {
        font-size: 11px;
        color: #acbbeb;
        margin-top: var(--spacing-xs);
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: 'Hind Siliguri', sans-serif;
    }

    .video-list {
        display: flex;
        flex-direction: column;
        padding: 0 var(--spacing-md) 20px;
        gap: var(--spacing-md);
    }

    .video-row {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        cursor: pointer;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        will-change: transform;
        border-radius: var(--border-radius-md);
        padding: 4px;
    }

    .video-row:hover {
        background: rgba(255,255,240,0.02);
    }

    .video-row:active {
        transform: scale(0.99);
        background: rgba(255,255,240,0.05);
    }

    .video-row.hidden {
        display: none;
    }

    .video-thumb {
        width: 120px;
        aspect-ratio: 16/9;
        border-radius: var(--border-radius-md);
        background: #16245e;
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        transition: transform 0.2s ease;
    }

    .video-row:hover .video-thumb {
        transform: scale(1.02);
    }

    .video-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.2s ease, transform 0.3s;
    }

    .video-thumb img.loaded {
        opacity: 1;
    }

    .video-row:hover .video-thumb img {
        transform: scale(1.1);
    }

    .video-thumb .skeleton {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    .video-details {
        flex: 1;
    }

    .video-title {
        font-weight: 600;
        font-size: 15px;
        line-height: 1.3;
        color: #f0e6d2;
        font-family: 'Montserrat', sans-serif;
    }

    .video-subject {
        font-size: 12px;
        color: #aeb9e6;
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        font-family: 'Hind Siliguri', sans-serif;
    }

    .video-subject i {
        font-size: 12px;
        color: #e6d29b;
    }

    .player-container {
        width: 100%;
        background: #000;
        aspect-ratio: 16/9;
        position: relative;
        max-height: 35vh;
        flex-shrink: 0;
    }

    @media (max-width: 480px) {
        .player-container {
            max-height: 35vh;
        }
    }

    #moreVideosList {
        flex-shrink: 0;
        padding-bottom: 20px;
    }
    
    #playerContainer {
        width: 100%;
        max-width: 100%;
        background: #000;
        height: 100%;
        position: relative;
    }
    
    #youtubePlayer {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }
    
    #youtubePlayer iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        border: none;
    }

    #playerView {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }

    .video-info-section {
        padding: var(--spacing-md);
        background: var(--bg-primary);
        flex-shrink: 0;
        animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .video-info-title {
        font-size: 25px;
        font-weight: 600;
        color: #f5e7cf;
        font-family: 'Montserrat', sans-serif;
    }

    .meta-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255,230,170,0.2);
    }

    .subject-badge {
        background: #d4e0ff;
        padding: 6px 14px;
        border-radius: var(--border-radius-xl);
        font-weight: 500;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: 'Montserrat', sans-serif;
        transition: transform 0.2s;
    }

    .subject-badge i {
        color: #fad984;
        font-size: 14px;
    }

    .hidden { 
        display: none !important; 
    }

    .section-divider { 
        height: 6px; 
        background: rgba(255,255,240,0.02);
    }

    .copy-toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #1e2d5e;
        color: #ffefcf;
        padding: var(--spacing-sm) 20px;
        border-radius: var(--border-radius-full);
        font-size: 14px;
        box-shadow: 0 8px 18px black;
        border: 1px solid #ffeeaa;
        z-index: var(--z-index-toast);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-family: 'Hind Siliguri', sans-serif;
    }

    .copy-toast.show {
        transform: translateX(-50%) translateY(0);
    }

    .back-btn:focus-visible,
    .subject-card:focus-visible,
    .video-row:focus-visible,
    .search-box:focus-visible {
        outline: 2px solid var(--accent-light);
        outline-offset: 2px;
    }

    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: var(--accent);
        animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .view::-webkit-scrollbar {
        width: 4px;
    }

    .view::-webkit-scrollbar-track {
        background: transparent;
    }

    .view::-webkit-scrollbar-thumb {
        background: rgba(255,230,170,0.3);
        border-radius: 4px;
    }

    .view::-webkit-scrollbar-thumb:hover {
        background: rgba(255,230,170,0.5);
    }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="copy-toast" id="copyToast">Student ID copied</div>

    <!-- HOME VIEW -->
    <div id="homeView" class="view">
        <div class="header">
            <div class="logo-area">
                <span class="logo-text">Studygram</span>
            </div>
            <div class="search-container">
                <input type="text" class="search-box" id="globalSearch" placeholder="Search subjects" aria-label="Search subjects">
            </div>
        </div>

        <div class="section-title">Subjects</div>
        <div class="subject-grid" id="subjectGrid"></div>
    </div>

    <!-- SUBJECT DETAIL VIEW -->
    <div id="subjectDetailView" class="view hidden">
        <div class="detail-header">
            <div class="back-btn" id="backFromSubject" aria-label="Go back"><i class="fas fa-arrow-left" aria-hidden="true"></i></div>
            <div class="search-container detail-search">
                <input type="text" class="search-box" id="subjectSearch" placeholder="Search in this subject" aria-label="Filter videos">
            </div>
        </div>
        <div class="section-title"><span id="subjectDetailTitle"></span></div>
        <div class="video-list" id="subjectVideoList"></div>
    </div>

    <!-- PLAYER VIEW -->
    <div id="playerView" class="view hidden">
        <div class="detail-header">
            <div class="back-btn" id="backFromPlayer" aria-label="Go back"><i class="fas fa-arrow-left" aria-hidden="true"></i></div>
            <div class="section-title" style="padding: 0; margin: 0;">Now Playing</div>
        </div>
        <div class="player-container" id="playerContainer">
            <div id="youtubePlayer"></div>
        </div>
        <div class="video-info-section">
            <div class="video-info-title" id="playerVideoTitle">Video title</div>
            <div class="meta-bar">
                <span class="subject-badge" id="playerSubjectName">Subject</span>
            </div>
        </div>

        <div class="section-title" style="padding-top: 8px;">Related Videos</div>
        <div class="video-list" id="moreVideosList" style="padding-bottom: 20px;"></div>
    </div>
</div>

<!-- data.js must be loaded first -->
<script src="data.js"></script>
<script>
(function() {
    // ---------- DATA (from global window object) ----------
    const lectures = window.lectureData || [];
    const subjectImage = window.subjectImage || {};

    function normalizeText(text) {
        return text.toLowerCase().normalize("NFC").trim();
    }

    // Debounce function for search
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    // ---------- navigation stack ----------
    const homeView = document.getElementById('homeView');
    const subjectDetailView = document.getElementById('subjectDetailView');
    const playerView = document.getElementById('playerView');
    const views = [homeView, subjectDetailView, playerView];

    let navStack = [];

    function pushState(state) {
        navStack.push(state);
    }

    function popState() {
        return navStack.pop();
    }

    function getCurrentState() {
        return navStack.length ? navStack[navStack.length-1] : null;
    }

    function stopVideo() {
        const player = document.getElementById('youtubePlayer');
        if (player) {
            player.innerHTML = '';
        }
    }

    function switchView(targetView, onAfterShow) {
        const currentView = views.find(v => !v.classList.contains('hidden'));
        if (!currentView) {
            views.forEach(v => v.classList.add('hidden'));
            targetView.classList.remove('hidden');
            if (onAfterShow) onAfterShow();
            return;
        }
        
        if (currentView === targetView) {
            if (onAfterShow) onAfterShow();
            return;
        }

        if (currentView === playerView) {
            stopVideo();
        }

        currentView.classList.add('hidden');
        targetView.classList.remove('hidden');
        
        setTimeout(() => {
            targetView.scrollTop = 0;
            if (onAfterShow) onAfterShow();
        }, 50);
    }

    // Show toast message
    function showToast(message, isError = false) {
        const toast = document.getElementById('copyToast');
        toast.textContent = message;
        toast.style.background = isError ? '#5e2a2a' : '#1e2d5e';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Render empty state
    function renderEmptyState(container, message, icon = 'fa-inbox', isSmall = false) {
        container.innerHTML = `<div class="empty-state">
            <i class="fas ${icon}" aria-hidden="true"></i>
            <p>${message}</p>
            ${isSmall ? '<small>Check back later</small>' : ''}
        </div>`;
    }

    // ----- Render helpers -----
    function getSubjectsWithCounts() {
        const map = new Map();
        lectures.forEach(v => map.set(v.subject, (map.get(v.subject) || 0) + 1));
        return Array.from(map.entries()).map(([name, count]) => ({ name, count }));
    }

    function renderSubjects() {
        const subjects = getSubjectsWithCounts();
        const grid = document.getElementById('subjectGrid');
        
        if (subjects.length === 0) {
            renderEmptyState(grid, 'No subjects available', 'fa-book', true);
            return;
        }

        grid.innerHTML = subjects.map(s => {
            const imgFile = subjectImage[s.name] || 'https://via.placeholder.com/300/1e2b5a/ffffff?text=Subject';
            return `<div class="subject-card" data-subject="${s.name}" tabindex="0" role="button" aria-label="${s.name} subject with ${s.count} videos">
                <div class="thumb-square"><img src="${imgFile}" alt="${s.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300/1e2b5a/ffffff?text=Subject'"></div>
                <div class="card-info"><div class="subject-name">${s.name}</div><div class="class-count">${s.count} classes</div></div>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.subject-card').forEach(card => {
            card.addEventListener('click', () => {
                const subject = card.dataset.subject;
                showSubjectDetail(subject);
            });
            
            card.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
        });
    }

    function renderVideoItems(videoArray, containerId, limit = 20) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (videoArray.length === 0) {
            renderEmptyState(container, 'No videos found', 'fa-video', true);
            return;
        }

        const take = videoArray.slice(0, limit);
        container.innerHTML = take.map(v => {
            const thumb = `https://img.youtube.com/vi/${v.videoid}/mqdefault.jpg`;
            return `<div class="video-row" data-videoid="${v.videoid}" data-subject="${v.subject}" data-title="${v.videotitle}" tabindex="0" role="button" aria-label="Play ${v.videotitle}">
                <div class="video-thumb">
                    <img src="${thumb}" loading="lazy" alt="${v.videotitle}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.src='https://via.placeholder.com/320x180/1e2b5a/ffffff?text=No+Thumbnail'">
                    <div class="skeleton" style="display: none;"></div>
                </div>
                <div class="video-details">
                    <div class="video-title">${v.videotitle}</div>
                    <div class="video-subject">${v.subject}</div>
                </div>
            </div>`;
        }).join('');
        
        const rows = container.querySelectorAll('.video-row');
        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            
            row.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                const videoid = this.dataset.videoid;
                const subject = this.dataset.subject;
                const title = this.dataset.title;
                showPlayer(videoid, subject, title);
                return false;
            };
            
            row.onkeypress = function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            };
        }
    }

    function updatePlayerContent(videoid, subject, title) {
        document.getElementById('youtubePlayer').innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${videoid}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1" 
                    allow="autoplay; encrypted-media; picture-in-picture" 
                    allowfullscreen>
            </iframe>`;
        document.getElementById('playerVideoTitle').innerText = title;
        document.getElementById('playerSubjectName').innerHTML = `${subject}`;
    }

    function updateMoreVideosList(currentVideoid, currentSubject) {
        const sameSubject = lectures.filter(v => v.subject === currentSubject && v.videoid !== currentVideoid);
        const otherSubjects = lectures.filter(v => v.subject !== currentSubject);
        const moreVideos = [...sameSubject, ...otherSubjects];
        renderVideoItems(moreVideos, 'moreVideosList', 20);
    }

    // ----- Show functions -----
    function showHome() {
        switchView(homeView, () => {
            renderSubjects();
            homeView.scrollTop = 0;
        });
        pushState({ view: 'home' });
    }

    function showSubjectDetail(subject) {
        switchView(subjectDetailView, () => {
            document.getElementById('subjectDetailTitle').innerText = subject;
            const filtered = lectures.filter(v => v.subject === subject);
            renderVideoItems(filtered, 'subjectVideoList', 30);
            
            const searchInput = document.getElementById('subjectSearch');
            const debouncedFilter = debounce(function(value) {
                const q = normalizeText(value);
                const rows = document.querySelectorAll('#subjectVideoList .video-row');
                let visibleCount = 0;
                
                rows.forEach(r => {
                    const t = normalizeText(r.dataset.title || '');
                    const shouldShow = !q || t.includes(q);
                    r.classList.toggle('hidden', !shouldShow);
                    if (shouldShow) visibleCount++;
                });

                const container = document.getElementById('subjectVideoList');
                const existingEmpty = container.querySelector('.empty-state');
                if (visibleCount === 0 && q && !existingEmpty) {
                    renderEmptyState(container, `No videos match "${value}"`, 'fa-search', true);
                } else if (existingEmpty && (visibleCount > 0 || !q)) {
                    existingEmpty.remove();
                }
            }, 300);

            searchInput.value = '';
            const newSearchInput = searchInput.cloneNode(true);
            searchInput.parentNode.replaceChild(newSearchInput, searchInput);
            newSearchInput.addEventListener('input', (e) => debouncedFilter(e.target.value));
            
            subjectDetailView.scrollTop = 0;
        });
        pushState({ view: 'subject', subject: subject });
    }

    function showPlayer(videoid, subject, title) {
        const currentView = views.find(v => !v.classList.contains('hidden'));

        if (currentView === playerView) {
            updatePlayerContent(videoid, subject, title);
            updateMoreVideosList(videoid, subject);
            playerView.scrollTop = 0;
            pushState({ view: 'player', subject, videoid, title });
            return;
        }

        switchView(playerView, () => {
            updatePlayerContent(videoid, subject, title);
            updateMoreVideosList(videoid, subject);
            playerView.scrollTop = 0;
        });
        pushState({ view: 'player', subject, videoid, title });
    }

    // ----- Back handlers -----
    function handleBack() {
        if (navStack.length <= 1) return;
        popState();
        const prev = getCurrentState();
        if (!prev) { showHome(); return; }

        if (prev.view === 'home') {
            switchView(homeView, () => {
                renderSubjects();
                homeView.scrollTop = 0;
            });
        } else if (prev.view === 'subject') {
            switchView(subjectDetailView, () => {
                document.getElementById('subjectDetailTitle').innerText = prev.subject;
                const filtered = lectures.filter(v => v.subject === prev.subject);
                renderVideoItems(filtered, 'subjectVideoList', 30);
                
                const searchInput = document.getElementById('subjectSearch');
                const newSearchInput = searchInput.cloneNode(true);
                searchInput.parentNode.replaceChild(newSearchInput, searchInput);
                newSearchInput.value = '';
                
                subjectDetailView.scrollTop = 0;
            });
        } else if (prev.view === 'player') {
            switchView(playerView, () => {
                updatePlayerContent(prev.videoid, prev.subject, prev.title);
                updateMoreVideosList(prev.videoid, prev.subject);
                playerView.scrollTop = 0;
            });
        }
    }

    // ----- Global error handler -----
    window.addEventListener('error', (event) => {
        console.error('Global error:', event.error);
        showToast('Something went wrong. Please try again.', true);
    });

    // Block YouTube links
    document.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (link && link.href && link.href.includes('youtube.com') && !link.href.includes('youtube-nocookie.com')) {
            e.preventDefault();
            e.stopPropagation();
            showToast('YouTube website is blocked. Please use the embedded player only.');
            return false;
        }
    }, true);

    // Initialize
    document.getElementById('backFromSubject').addEventListener('click', handleBack);
    document.getElementById('backFromPlayer').addEventListener('click', handleBack);

    // Global search with debounce
    const globalSearch = document.getElementById('globalSearch');
    const debouncedGlobalSearch = debounce(function(value) {
        const q = normalizeText(value);
        let anyVisible = false;

        document.querySelectorAll('#subjectGrid .subject-card').forEach(card => {
            const subj = card.dataset.subject ? normalizeText(card.dataset.subject) : '';
            const visible = !q || subj.includes(q);
            card.classList.toggle('hidden', !visible);
            if (visible) anyVisible = true;
        });

        const homeView = document.getElementById('homeView');
        const existingEmpty = homeView.querySelector('.global-search-empty');
        if (!anyVisible && q && !existingEmpty) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state global-search-empty';
            emptyDiv.innerHTML = `<i class="fas fa-search" aria-hidden="true"></i><p>No subjects match "${value}"</p>`;
            homeView.insertBefore(emptyDiv, document.getElementById('subjectGrid').nextSibling);
        } else if (existingEmpty && (anyVisible || !q)) {
            existingEmpty.remove();
        }
    }, 300);

    globalSearch.addEventListener('input', (e) => debouncedGlobalSearch(e.target.value));

    // Initial render
    try {
        renderSubjects();
    } catch (error) {
        console.error('Initial render error:', error);
        showToast('Error loading content. Please refresh.', true);
    }

    views.forEach(v => v.classList.add('hidden'));
    homeView.classList.remove('hidden');
    navStack = [{ view: 'home' }];
})();
</script>
</body>
</html>
